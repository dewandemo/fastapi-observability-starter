family: fastapi-observability-starter
executionRoleArn: arn:aws:iam::915632791698:role/ecsTaskExecutionRole
networkMode: awsvpc
requiresCompatibilities:
  - FARGATE
cpu: "256"
memory: "512"

containerDefinitions:
  - name: fastapi-observability-starter
    image: <+artifacts.primary.image>
    essential: true
    portMappings:
      - containerPort: 8080
        protocol: tcp
    environment:
      - name: HARNESS_PIPELINE_ID
        value: <+pipeline.identifier>
      - name: HARNESS_EXECUTION_SEQ
        value: <+pipeline.sequenceId>
      - name: HARNESS_IMAGE_TAG
        value: <+artifacts.primary.tag>
      - name: HARNESS_DEPLOYED_AT
        value: <+pipeline.startTs>
      - name: HARNESS_EXECUTION_URL
        value: <+pipeline.executionUrl>
    logConfiguration:
      logDriver: awslogs
      options:
        awslogs-group: /ecs/fastapi-observability-starter
        awslogs-region: us-east-2
        awslogs-stream-prefix: ecs
