family: fastapi-observability-starter
executionRoleArn: arn:aws:iam::915632791698:role/ecsTaskExecutionRole
networkMode: awsvpc
requiresCompatibilities:
  - FARGATE
cpu: "256"
memory: "512"

containerDefinitions:
  - name: fastapi-observability-starter
    image: <+artifacts.primary.image>
    essential: true
    portMappings:
      - containerPort: 8080
        protocol: tcp
    logConfiguration:
      logDriver: awslogs
      options:
        awslogs-group: /ecs/fastapi-observability-starter
        awslogs-region: us-east-2
        awslogs-stream-prefix: ecs
